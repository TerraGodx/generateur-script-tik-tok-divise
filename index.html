<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScriptDivise — Cyrille au Large</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0d1b2a;
    --ocean: #1a3a5c;
    --horizon: #2e6b9e;
    --gold: #c9a84c;
    --white: #fafcff;
    --muted: #6b7f8e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 80% 50% at 20% 10%, rgba(46,107,158,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(26,58,92,0.2) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 760px;
    margin: 0 auto;
    padding: 48px 24px 80px;
  }

  header { text-align: center; margin-bottom: 48px; }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }

  .brand {
    font-family: 'Playfair Display', serif;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--gold);
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(26px, 5vw, 40px);
    font-weight: 700;
    line-height: 1.15;
    margin-bottom: 12px;
  }

  h1 em { font-style: italic; color: var(--gold); }

  .subtitle {
    font-size: 13px;
    color: var(--muted);
    font-weight: 300;
    letter-spacing: 0.04em;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: var(--gold);
    margin: 18px auto;
    opacity: 0.5;
  }

  .card {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px;
    backdrop-filter: blur(8px);
    margin-bottom: 28px;
  }

  .field-group { margin-bottom: 24px; }

  label {
    display: block;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 9px;
    font-weight: 500;
  }

  input[type="text"], select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 13px 16px;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  input[type="text"]:focus, select:focus {
    border-color: var(--gold);
    background: rgba(201,168,76,0.06);
  }

  input::placeholder { color: rgba(255,255,255,0.22); }
  select option { background: var(--ink); color: var(--white); }

  .examples-row {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    margin-top: 11px;
  }

  .chip {
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.22);
    border-radius: 20px;
    padding: 5px 13px;
    font-size: 12px;
    color: var(--gold);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .chip:hover { background: rgba(201,168,76,0.2); border-color: var(--gold); }

  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  @media (max-width: 500px) { .two-col { grid-template-columns: 1fr; } }

  .btn-generate {
    width: 100%;
    background: var(--gold);
    color: var(--ink);
    border: none;
    border-radius: 12px;
    padding: 17px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
  }

  .btn-generate:hover {
    background: #d9b85c;
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(201,168,76,0.28);
  }

  .btn-generate:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .spinner {
    width: 17px;
    height: 17px;
    border: 2px solid rgba(13,27,42,0.3);
    border-top-color: var(--ink);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .result-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 16px;
    overflow: hidden;
    animation: fadeUp 0.4s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-header {
    background: rgba(201,168,76,0.08);
    border-bottom: 1px solid rgba(201,168,76,0.15);
    padding: 18px 26px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 10px;
  }

  .result-title {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--gold);
    font-style: italic;
  }

  .duration-badge {
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 20px;
    padding: 4px 13px;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 0.07em;
  }

  .result-body { padding: 26px; }

  .script-block { margin-bottom: 22px; }

  .block-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--horizon);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .block-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(46,107,158,0.2);
  }

  .block-content {
    font-size: 15px;
    line-height: 1.75;
    color: rgba(255,255,255,0.87);
    white-space: pre-wrap;
  }

  .block-content strong { color: var(--white); font-weight: 500; }

  .timing {
    font-size: 11px;
    color: var(--muted);
    font-style: italic;
    margin-top: 5px;
  }

  .result-actions {
    padding: 18px 26px;
    border-top: 1px solid rgba(255,255,255,0.06);
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn-copy {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-copy:hover { background: rgba(255,255,255,0.12); }
  .btn-copy.copied { border-color: #4caf7d; color: #4caf7d; }

  .btn-regen {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    border-radius: 8px;
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-regen:hover { background: rgba(201,168,76,0.08); border-color: var(--gold); }

  .error-msg {
    background: rgba(220,80,80,0.1);
    border: 1px solid rgba(220,80,80,0.25);
    border-radius: 10px;
    padding: 14px 18px;
    color: #ff8a8a;
    font-size: 14px;
    text-align: center;
    margin-top: 14px;
  }

  .wave-deco {
    text-align: center;
    font-size: 22px;
    opacity: 0.12;
    margin: 36px 0 16px;
    letter-spacing: 8px;
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-line">
      <span>🚢</span>
      <span class="brand">Cyrille au Large</span>
    </div>
    <h1>Le générateur de scripts<br><em>qui divisent</em></h1>
    <div class="divider"></div>
    <p class="subtitle">Format TikTok · 1 min 30 à 2 min · Formule tension maximale</p>
  </header>

  <div class="card">
    <div class="field-group">
      <label>Le sujet qui divise</label>
      <input type="text" id="sujet" placeholder="Ex : cabine intérieure MSC" />
      <div class="examples-row" id="examplesRow"></div>
    </div>

    <div class="two-col">
      <div class="field-group">
        <label>Option A — côté négatif</label>
        <input type="text" id="optionA" placeholder="Ex : la prison" />
      </div>
      <div class="field-group">
        <label>Option B — côté malin</label>
        <input type="text" id="optionB" placeholder="Ex : le choix malin" />
      </div>
    </div>

    <div class="two-col">
      <div class="field-group">
        <label>Compagnie</label>
        <select id="compagnie">
          <option value="MSC Croisières">MSC Croisières</option>
          <option value="Costa Croisières">Costa Croisières</option>
          <option value="Royal Caribbean">Royal Caribbean</option>
          <option value="Norwegian Cruise Line">Norwegian Cruise Line</option>
          <option value="Croisières en général">Croisières en général</option>
        </select>
      </div>
      <div class="field-group">
        <label>Durée cible</label>
        <select id="duree">
          <option value="1:30">1 min 30</option>
          <option value="1:45" selected>1 min 45</option>
          <option value="2:00">2 min</option>
        </select>
      </div>
    </div>

    <button class="btn-generate" id="btnGenerate" onclick="generer()">
      <span id="btnSpinner" style="display:none"><div class="spinner"></div></span>
      <span id="btnText">✦ Générer le script</span>
    </button>
  </div>

  <div id="errorMsg" style="display:none" class="error-msg"></div>
  <div id="resultZone" style="display:none"></div>

  <div class="wave-deco">~ ~ ~ ~ ~</div>

</div>

<script>
const EXEMPLES = [
  { sujet: "Cabine intérieure MSC", a: "la prison", b: "le choix malin" },
  { sujet: "Pension complète MSC", a: "l'arnaque", b: "le jackpot" },
  { sujet: "WiFi à bord", a: "le piège", b: "la nécessité" },
  { sujet: "Excursions MSC officielles", a: "l'erreur", b: "la sécurité" },
  { sujet: "Table partagée MSC", a: "le cauchemar", b: "la bonne surprise" },
  { sujet: "Réservation last minute", a: "le risque", b: "l'astuce" },
  { sujet: "Le buffet MSC", a: "le chaos", b: "la liberté" },
];

const row = document.getElementById('examplesRow');
EXEMPLES.forEach(ex => {
  const chip = document.createElement('div');
  chip.className = 'chip';
  chip.textContent = ex.sujet;
  chip.onclick = () => {
    document.getElementById('sujet').value = ex.sujet;
    document.getElementById('optionA').value = ex.a;
    document.getElementById('optionB').value = ex.b;
  };
  row.appendChild(chip);
});

let lastScript = '';

async function generer() {
  const sujet     = document.getElementById('sujet').value.trim();
  const optA      = document.getElementById('optionA').value.trim();
  const optB      = document.getElementById('optionB').value.trim();
  const compagnie = document.getElementById('compagnie').value;
  const duree     = document.getElementById('duree').value;

  document.getElementById('errorMsg').style.display = 'none';
  if (!sujet)         return showError("Indique le sujet qui divise.");
  if (!optA || !optB) return showError("Remplis les deux options (A et B).");

  const btn = document.getElementById('btnGenerate');
  btn.disabled = true;
  document.getElementById('btnSpinner').style.display = 'inline-flex';
  document.getElementById('btnText').textContent = 'Génération en cours…';

  const dureeMap = { "1:30": "environ 220 mots", "1:45": "environ 260 mots", "2:00": "environ 300 mots" };
  const nbMots = dureeMap[duree];

  const prompt = `Tu es expert en scripts TikTok pour créateurs de contenu croisière.
Écris un script TikTok pour le compte "Cyrille au Large", passionné de croisières ${compagnie}.

SUJET : ${sujet} sur ${compagnie}
TENSION DU TITRE : "${optA}" ou "${optB}" ?
DURÉE CIBLE : ${duree} (${nbMots})

STRUCTURE OBLIGATOIRE en 4 blocs :

[ACCROCHE] — 5 à 8 secondes
Commence par une question ou affirmation choc qui pose la tension immédiatement.
Indique entre [crochets] le texte à afficher à l'écran (le titre de la vidéo).

[DÉVELOPPEMENT] — 40 à 50 secondes
Présente les arguments du côté négatif ("${optA}") avec des faits concrets et spécifiques sur ${compagnie}.
Ajoute des [textes courts à l'écran] en rythme avec le discours.

[RETOURNEMENT] — 30 à 40 secondes
Renverse complètement. Révèle pourquoi c'est en réalité "${optB}".
Donne 2 ou 3 arguments forts et spécifiques. Ajoute des [textes à l'écran].

[CONCLUSION] — 10 à 15 secondes
Call to action fort. Pose une question à la communauté ou invite à commenter.

Réponds UNIQUEMENT avec le script structuré, sans introduction ni commentaire autour.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "anthropic-dangerous-direct-browser-access": "true"
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) { showError("Erreur API : " + data.error.message); return; }

    const texte = data.content[0].text;
    lastScript = texte;
    afficherResultat(sujet, optA, optB, texte, duree);

  } catch(e) {
    showError("Erreur de connexion. Réessaie dans quelques instants.");
  } finally {
    btn.disabled = false;
    document.getElementById('btnSpinner').style.display = 'none';
    document.getElementById('btnText').textContent = '✦ Générer le script';
  }
}

function afficherResultat(sujet, optA, optB, texte, duree) {
  const blocs = [
    { key: 'ACCROCHE',      label: 'Accroche',     timing: '5 – 8 sec' },
    { key: 'DÉVELOPPEMENT', label: 'Développement', timing: '40 – 50 sec' },
    { key: 'RETOURNEMENT',  label: 'Retournement',  timing: '30 – 40 sec' },
    { key: 'CONCLUSION',    label: 'Conclusion',    timing: '10 – 15 sec' },
  ];

  let html = `
    <div class="result-card">
      <div class="result-header">
        <div class="result-title">${sujet} : ${optA} ou ${optB} ?</div>
        <div class="duration-badge">⏱ ${duree}</div>
      </div>
      <div class="result-body">
  `;

  let hasBlocs = false;
  blocs.forEach(bloc => {
    const variants = [bloc.key, bloc.key.normalize('NFD').replace(/[\u0300-\u036f]/g,'')];
    let contenu = '';
    for (const v of variants) {
      const regex = new RegExp(`\\[${v}\\][^\\n]*\\n([\\s\\S]*?)(?=\\n\\s*\\[(?:ACCROCHE|D[EÉ]VELOPPEMENT|RETOURNEMENT|CONCLUSION)\\]|$)`, 'i');
      const m = texte.match(regex);
      if (m) { contenu = m[1].trim(); break; }
    }
    if (contenu) {
      hasBlocs = true;
      const formatted = contenu.replace(/\[([^\]]+)\]/g, '<strong>[$1]</strong>');
      html += `
        <div class="script-block">
          <div class="block-label">${bloc.label}</div>
          <div class="block-content">${formatted}</div>
          <div class="timing">${bloc.timing}</div>
        </div>
      `;
    }
  });

  if (!hasBlocs) {
    const formatted = texte.replace(/\[([^\]]+)\]/g, '<strong>[$1]</strong>');
    html += `<div class="block-content">${formatted}</div>`;
  }

  html += `
      </div>
      <div class="result-actions">
        <button class="btn-copy" id="btnCopy" onclick="copier()">📋 Copier le script</button>
        <button class="btn-regen" onclick="generer()">↻ Régénérer</button>
      </div>
    </div>
  `;

  const zone = document.getElementById('resultZone');
  zone.style.display = 'block';
  zone.innerHTML = html;
  zone.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copier() {
  navigator.clipboard.writeText(lastScript).then(() => {
    const btn = document.getElementById('btnCopy');
    btn.textContent = '✓ Copié !';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '📋 Copier le script';
      btn.classList.remove('copied');
    }, 2000);
  });
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('btnGenerate').disabled = false;
  document.getElementById('btnSpinner').style.display = 'none';
  document.getElementById('btnText').textContent = '✦ Générer le script';
}
</script>
</body>
</html>
